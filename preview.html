<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<title>V15 二分类判定版预览</title>
<style>
body{margin:0;background:#f5f7fb;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei UI",sans-serif;color:#172033;}
.wrap{max-width:1180px;margin:50px auto;padding:0 28px;}
.accent{height:7px;border-radius:999px;background:linear-gradient(90deg,#f4bfd3,#2563eb,#0f9f8f);box-shadow:0 18px 40px rgba(37,99,235,.16);}
.hero{margin-top:26px;background:#fff;border:1px solid #e3eaf3;border-radius:24px;padding:34px;box-shadow:0 18px 48px rgba(30,48,80,.08);}
.label{display:inline-block;background:#f4f7ff;color:#1e3a8a;padding:7px 13px;border-radius:999px;font-weight:800;font-size:13px;letter-spacing:.08em;}
h1{font-size:38px;margin:15px 0 8px;letter-spacing:-.02em;}
p{line-height:1.7;color:#64748b;}
.grid{display:grid;grid-template-columns:1.2fr .9fr;gap:24px;margin-top:24px;}
.card{background:#fff;border:1px solid #e3eaf3;border-radius:20px;padding:24px;box-shadow:0 16px 42px rgba(30,48,80,.07);}
.result{font-size:88px;font-weight:950;color:#047868;line-height:1;margin:14px 0;}
.tag{display:inline-block;background:#e8fbf7;color:#047868;border-radius:999px;padding:10px 16px;font-weight:900;}
.smallgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;}
.metric{background:#f8fafc;border:1px solid #e3eaf3;border-radius:15px;padding:14px;}
.metric b{display:block;font-size:22px;color:#172033;margin-top:4px;}
</style>
</head>
<body>
<div class="wrap">
<div class="accent"></div>
<section class="hero">
<span class="label">医学科研辅助看板 · 二分类判定版</span>
<h1>乳腺癌 Miller–Payne 良好反应预测系统</h1>
<p>基于治疗前临床特征、MRI影像特征及免疫组化指标，输出是否预测为 MP 4–5 级良好病理反应。</p>
<div class="grid">
<div class="card">
<h2>单病例特征输入</h2>
<p>包含年龄、肿瘤最大径、ADC值、钙化情况、动态增强曲线类型、ER、PR、HER2、Ki-67。</p>
<div class="smallgrid"><div class="metric">年龄<b>52岁</b></div><div class="metric">ADC值<b>0.950</b></div><div class="metric">HER2评分<b>0</b></div><div class="metric">Ki-67指数<b>70%</b></div></div>
</div>
<div class="card">
<h2>模型二分类判定结果</h2>
<div class="result">是</div>
<span class="tag">预测为 MP 4–5 级良好病理反应</span>
<div class="smallgrid"><div class="metric">模型输出值<b>0.726</b></div><div class="metric">固定判定阈值<b>0.644</b></div></div>
<p>模型输出值仅用于与固定阈值比较，不应解释为真实临床发生概率。</p>
</div>
</div>
</section>
</div>
</body>
</html>
